<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProFlow Extension</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>ProFlow <span>Master</span></h1>
      <p>All-in-one productivity toolkit.</p>
    </header>

    <div class="tabs">
      <button class="tab-btn active" data-tab="features">Features</button>
      <button class="tab-btn" data-tab="history">History</button>
      <button class="tab-btn" data-tab="settings">Settings</button>
    </div>

    <main id="tab-content">
      <!-- Features Tab -->
      <section id="features" class="tab-pane active">
        <div class="card">
          <div class="card-info">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-moon"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
            <div>
              <h3>Night Mode</h3>
              <p>Invert any page instantly.</p>
            </div>
          </div>
          <label class="switch">
            <input type="checkbox" id="night-mode-toggle">
            <span class="slider round"></span>
          </label>
        </div>

        <div class="card clickable" id="color-picker-btn">
          <div class="card-info">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-pipette"><path d="m15 11 4.85-4.85a2.5 2.5 0 0 0-3.54-3.54L11.46 7.46q-1.23.64-1.23 2.05v1.44"/><path d="M11 11L1 21L3 23L13 13"/><path d="M11 15H9.56q-1.41 0-2.05 1.23l-2.66 5.12a2.5 2.5 0 0 1-3.54-3.54l5.12-2.66Q7.45 14.5 7.45 13.11V11"/></svg>
            <div>
              <h3>Color Picker</h3>
              <p>Grab Hex codes from page.</p>
            </div>
          </div>
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-right arrow"><path d="m9 18 6-6-6-6"/></svg>
        </div>

        <div class="card status">
          <div class="card-info">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-save"><path d="M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><circle cx="12" cy="13" r="3"/><path d="M7 3v5h8"/></svg>
            <div>
              <h3>Auto-Save</h3>
              <p id="save-status-text">Monitoring all forms...</p>
            </div>
          </div>
          <button id="restore-btn" class="badge clickable" style="display:none; border:none; cursor:pointer;">Restore</button>
          <span class="badge" id="save-count">Idle</span>
        </div>
      </section>

      <!-- Clipboard History Tab -->
      <section id="history" class="tab-pane">
        <div class="header-row">
          <h3>Recent Copies</h3>
          <button id="clear-history" class="text-btn">Clear All</button>
        </div>
        <ul id="history-list" class="styled-list">
          <!-- Items will be injected here -->
          <li class="empty-state">No copies yet...</li>
        </ul>
      </section>

      <!-- Settings Tab -->
      <section id="settings" class="tab-pane">
        <div class="card">
          <div class="card-info">
            <div>
              <h3>Version 1.0</h3>
              <p>Everything is stored locally.</p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <p>ProFlow is powered by local storage.</p>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
